project_name: UMA-Inverse
run_name: pairmixerinv-v3
seed: 42

paths:
  train_json: LigandMPNN/training/train.json
  valid_json: LigandMPNN/training/valid.json
  pdb_dir: data/raw/pdb_archive
  output_dir: outputs

training:
  lr: 3e-4
  weight_decay: 1e-2
  epochs: 10
  devices: 1
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 20
  accumulate_grad_batches: 1
  compile_model: false
  warmup_steps: 1000
  T_max: 280000
  early_stop_patience: 10
  # v3: 0.1 Å Gaussian noise on raw N/Cα/C/O + ligand coords (training-only).
  coord_noise_std: 0.1

wandb:
  enabled: false
  mode: offline

model:
  residue_input_dim: 6
  ligand_input_dim: 6
  node_dim: 128
  pair_dim: 128
  pair_hidden_dim: 128
  num_pairmixer_blocks: 6
  pair_transition_mult: 4
  num_rbf: 32
  max_distance: 24.0
  dropout: 0.1
  gradient_checkpointing: false
  thermal_noise_std: 0.0
  # v3 architecture mirrors all the data-side flags via interpolation; data is
  # the authoritative source of truth.
  ligand_featurizer: ${data.ligand_featurizer}
  residue_anchor: ${data.residue_anchor}
  pair_distance_atoms: ${data.pair_distance_atoms}
  pair_distance_atoms_ligand: ${data.pair_distance_atoms_ligand}
  frame_relative_angles: ${data.frame_relative_angles}
  intra_ligand_multidist: false
  coord_noise_std: ${training.coord_noise_std}

# v3 default flag set — matches scripts/SLURM/04c_v3_train_stage3_ddp.sh
# overrides. When you change a flag here, change the matching `++data.*=...`
# in the stage-3 SLURM script too.
data:
  batch_size: 8
  num_workers: 8
  pin_memory: true
  ligand_context_atoms: 25
  cutoff_for_score: 8.0
  max_total_nodes: 384
  # v3: LigandMPNN-faithful element featurizer (atomic_num + group + period
  # one-hots → Linear(147 → node_dim)). Direct port of LigandMPNN
  # model_utils.py:1284-1295.
  ligand_featurizer: ligandmpnn_atomic
  residue_anchor: cb
  # v3: full LigandMPNN 25-distance backbone-pair set in the L-L block.
  pair_distance_atoms: backbone_full_25
  # v3: 5 backbone-atom × ligand-atom distances in the L-M / M-L blocks.
  pair_distance_atoms_ligand: backbone_full
  # v3: per-(residue, ligand-atom) frame-relative sin/cos features in L-M.
  frame_relative_angles: true
  # v3: parser emits per-residue sidechain heavy atoms (required for the
  # sidechain-context augmentation during training; no-op for inference).
  return_sidechain_atoms: true
  # v3: training-time augmentation rate; ignored at inference (val/test
  # disable the augmentation regardless of this value).
  sidechain_context_rate: 0.03

inference:
  temperature: 0.1
  keep_native_unknown: true
