project_name: UMA-Inverse
run_name: pairmixerinv-v2
seed: 42

paths:
  train_json: LigandMPNN/training/train.json
  valid_json: LigandMPNN/training/valid.json
  pdb_dir: data/raw/pdb_archive
  output_dir: outputs

training:
  lr: 3e-4
  weight_decay: 1e-2
  epochs: 10
  devices: 1
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 20
  accumulate_grad_batches: 1
  compile_model: false
  # Per-stage overrides in scripts/SLURM/03_train_model.sh tune these to each
  # stage's actual step budget. The defaults below are sized for a single
  # stage-1 run at bsz=8 (~280K steps for 15 epochs at ~145K samples/epoch)
  # so that ad-hoc `train.py` invocations don't silently freeze the LR.
  warmup_steps: 1000
  T_max: 280000
  early_stop_patience: 10
  # v3 phase 4 — Gaussian σ (Å) noise added to raw residue + ligand coords
  # at the top of forward(), training-only. 0.0 disables. v3 default = 0.1.
  coord_noise_std: 0.0

wandb:
  enabled: false   # set true to log runs; mode: offline avoids network req on HPC
  mode: offline

model:
  residue_input_dim: 6
  ligand_input_dim: 6
  node_dim: 128
  pair_dim: 128
  pair_hidden_dim: 128
  num_pairmixer_blocks: 6
  pair_transition_mult: 4
  num_rbf: 32
  max_distance: 24.0
  dropout: 0.1
  gradient_checkpointing: false
  thermal_noise_std: 0.0
  # v2 featurizer flags mirror data.* — the data layer is the authoritative
  # source of truth; the model reads the same value so train/infer stay aligned.
  ligand_featurizer: ${data.ligand_featurizer}
  residue_anchor: ${data.residue_anchor}
  pair_distance_atoms: ${data.pair_distance_atoms}
  # v3 phase 1/2/3/4 mirrors — data layer is authoritative.
  pair_distance_atoms_ligand: ${data.pair_distance_atoms_ligand}
  frame_relative_angles: ${data.frame_relative_angles}
  intra_ligand_multidist: false
  coord_noise_std: ${training.coord_noise_std}

data:
  batch_size: 8
  num_workers: 8
  pin_memory: true
  ligand_context_atoms: 25
  cutoff_for_score: 8.0
  max_total_nodes: 384
  # v2 phase 1 — "onehot6" = v1 6-bin element one-hot.
  # "atomic_number_embedding" = per-element learnable embedding over atomic
  # numbers (slot 0 padding, 1-118 periodic table, 119 unknown). v2 default.
  ligand_featurizer: atomic_number_embedding
  # v2 phase 2 — "ca" = v1 (Cα is the residue anchor for pair-tensor distance).
  # "cb" = virtual Cβ via the ProteinMPNN formula (N, CA, C → Cβ) so
  # residue-ligand distances are measured from the sidechain stub rather than
  # the backbone. v2 default.
  residue_anchor: cb
  # v2 phase 3 — "anchor_only" = v1 (single-atom pairwise distance over the
  # concatenated residue+ligand coordinate tensor). "backbone_full" = the
  # residue-residue [L,L] block uses 5 backbone-pair distances (Cα-Cα, Cα-N,
  # Cα-C, N-O, O-C) stacked and re-projected; [L,M]/[M,L]/[M,M] blocks stay
  # single-atom (ligand atoms have no backbone analogue). Phase 2 still
  # governs the residue-ligand anchor under backbone_full. v2 default.
  pair_distance_atoms: backbone_full
  # v3 phase 1 — when "backbone_full", the residue-ligand [L,M]/[M,L] block
  # uses 5 backbone-atom × ligand-atom distances instead of the single
  # Cβ-anchor. "anchor_only" keeps v2 behaviour (single-atom). v3 default =
  # "backbone_full".
  pair_distance_atoms_ligand: anchor_only
  # v3 phase 2 — per-(residue, ligand atom) sin/cos features describing the
  # ligand atom's bearing in the residue's local N-Cα-C frame, concatenated
  # into the [L,M] pair-tensor block. v3 default = true.
  frame_relative_angles: false
  # v3 phase 5 — when true, the parser/cache emits per-residue sidechain
  # heavy-atom tensors. Required for sidechain_context_rate > 0 (the
  # geometric augmentation appends a random fraction of these atoms to
  # ligand_coords during training). v3 default = true.
  return_sidechain_atoms: false
  # v3 phase 5 — fraction of designable residues whose sidechain heavy atoms
  # are appended to ligand_coords during training (forces the model to handle
  # conditional decoding from real sidechain geometry, à la LigandMPNN's
  # use_side_chains). Train-only. v3 default = 0.03.
  sidechain_context_rate: 0.0

inference:
  temperature: 0.1
  keep_native_unknown: true
