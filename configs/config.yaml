project_name: UMA-Inverse
run_name: pairmixer-inverse-v1
seed: 42

paths:
  train_json: LigandMPNN/training/train.json
  valid_json: LigandMPNN/training/valid.json
  pdb_dir: data/raw/pdb_archive
  output_dir: outputs

training:
  lr: 3e-4
  weight_decay: 1e-2
  epochs: 10
  devices: 1
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 20
  accumulate_grad_batches: 1
  compile_model: false
  # Per-stage overrides in scripts/SLURM/03_train_model.sh tune these to each
  # stage's actual step budget. The defaults below are sized for a single
  # stage-1 run at bsz=8 (~280K steps for 15 epochs at ~145K samples/epoch)
  # so that ad-hoc `train.py` invocations don't silently freeze the LR.
  warmup_steps: 1000
  T_max: 280000
  early_stop_patience: 10

wandb:
  enabled: false   # set true to log runs; mode: offline avoids network req on HPC
  mode: offline

model:
  residue_input_dim: 6
  ligand_input_dim: 6
  node_dim: 128
  pair_dim: 128
  pair_hidden_dim: 128
  num_pairmixer_blocks: 6
  pair_transition_mult: 4
  num_rbf: 32
  max_distance: 24.0
  dropout: 0.1
  gradient_checkpointing: false
  thermal_noise_std: 0.0
  # v2 featurizer flags mirror data.* — the data layer is the authoritative
  # source of truth; the model reads the same value so train/infer stay aligned.
  ligand_featurizer: ${data.ligand_featurizer}
  residue_anchor: ${data.residue_anchor}
  pair_distance_atoms: ${data.pair_distance_atoms}

data:
  batch_size: 8
  num_workers: 8
  pin_memory: true
  ligand_context_atoms: 25
  cutoff_for_score: 8.0
  max_total_nodes: 384
  # v2 phase 1 — "onehot6" = v1 6-bin element one-hot (default, unchanged).
  # "atomic_number_embedding" = per-element learnable embedding over atomic
  # numbers. See scripts/smoke_test_v2.py for forward-path coverage.
  ligand_featurizer: onehot6
  # v2 phase 2 — "ca" = v1 default (Cα is the residue anchor for pair-tensor
  # distance). "cb" = virtual Cβ via the ProteinMPNN formula (N, CA, C → Cβ)
  # so residue-ligand distances are measured from the sidechain stub rather
  # than the backbone. Model is agnostic; flag is purely for the data layer
  # and is mirrored into model.* for manifest traceability.
  residue_anchor: ca
  # v2 phase 3 — "anchor_only" = v1 default (single-atom pairwise distance
  # over the concatenated residue+ligand coordinate tensor). "backbone_full"
  # = the residue-residue [L,L] block uses 5 backbone-pair distances
  # (Cα-Cα, Cα-N, Cα-C, N-O, O-C) stacked and re-projected; the [L,M],
  # [M,L], [M,M] blocks stay single-atom (they involve ligand atoms, for
  # which there is no backbone analogue). Phase 2 still governs the
  # residue-ligand anchor even when this flag is on.
  pair_distance_atoms: anchor_only

inference:
  temperature: 0.1
  keep_native_unknown: true
