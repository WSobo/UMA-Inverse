project_name: UMA-Inverse
run_name: pairmixer-inverse-v1
seed: 42

paths:
  train_json: ../LigandMPNN/training/train.json
  valid_json: ../LigandMPNN/training/valid.json
  pdb_dir: data/raw/pdb_archive
  output_dir: outputs

training:
  lr: 3e-4
  weight_decay: 1e-2
  epochs: 10
  devices: 1
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 20
  accumulate_grad_batches: 1
  compile_model: false
  warmup_steps: 500
  T_max: 50000
  early_stop_patience: 10

wandb:
  enabled: false   # set true to log runs; mode: offline avoids network req on HPC
  mode: offline

model:
  residue_input_dim: 6
  ligand_input_dim: 6
  node_dim: 128
  pair_dim: 128
  pair_hidden_dim: 128
  num_pairmixer_blocks: 6
  pair_transition_mult: 4
  num_rbf: 32
  max_distance: 24.0
  dropout: 0.1
  gradient_checkpointing: true
  thermal_noise_std: 0.0

data:
  batch_size: 1
  num_workers: 2
  pin_memory: true
  ligand_context_atoms: 25
  cutoff_for_score: 8.0
  max_total_nodes: 384

inference:
  temperature: 0.1
  keep_native_unknown: true
